services:

  # ─── Infrastructure ───────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: payflow-postgres
    environment:
      POSTGRES_USER: payflow
      POSTGRES_PASSWORD: payflow123
      POSTGRES_DB: payflow_users
    volumes:
      - postgres-db:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "7000:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U payflow" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - payflow-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - payflow-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1   # 1 = single broker (dev only)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true        # auto-create topics on first use
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 9092 || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - payflow-network

  # Kafka UI — see topics and messages visually (game changer for debugging)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - payflow-network

  # ─── Services ─────────────────────────────────────────────

  user-service:
    build: ./user-service
    container_name: payflow-user-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payflow_users
      SPRING_DATASOURCE_USERNAME: payflow
      SPRING_DATASOURCE_PASSWORD: payflow123
    networks:
      - payflow-network

  wallet-service:
    build: ./wallet-service
    container_name: payflow-wallet-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payflow_wallets
      SPRING_DATASOURCE_USERNAME: payflow
      SPRING_DATASOURCE_PASSWORD: payflow123
    networks:
      - payflow-network

  transaction-service:
    build: ./transaction-service
    container_name: payflow-transaction-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payflow_transactions
      SPRING_DATASOURCE_USERNAME: payflow
      SPRING_DATASOURCE_PASSWORD: payflow123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVICES_WALLET_URL: http://wallet-service:8082
    networks:
      - payflow-network

  notification-service:
    build: ./notification-service
    container_name: payflow-notification-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - payflow-network

  audit-service:
    build: ./audit-service
    container_name: payflow-audit-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payflow_audit
      SPRING_DATASOURCE_USERNAME: payflow
      SPRING_DATASOURCE_PASSWORD: payflow123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - payflow-network

  api-gateway:
    build: ./api-gateway
    container_name: payflow-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - wallet-service
      - transaction-service
    environment:
      USER_SERVICE_URL: http://user-service:8081
      WALLET_SERVICE_URL: http://wallet-service:8082
      TRANSACTION_SERVICE_URL: http://transaction-service:8083
    networks:
      - payflow-network

networks:
  payflow-network:
    driver: bridge

volumes:
  postgres-db: