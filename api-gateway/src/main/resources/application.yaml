server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

        - id: wallet-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/wallets/**

        - id: transaction-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/transactions/**

application:
  security:
    jwt:
